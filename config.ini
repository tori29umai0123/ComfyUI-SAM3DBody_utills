; SAM3DBody runtime configuration.
;
; [active]   pack       = directory name under presets/ that supplies
;                         face_blendshapes.npz, mhr_reference_vertices.json,
;                         and chara_settings_presets/*.json.
; [blender]  exe_path   = absolute path to blender(.exe). Used by the
;                         FBX/BVH export nodes. Updated automatically
;                         whenever an export node runs with a new path,
;                         so newly-added export nodes inherit the latest
;                         working location as their UI default.

[active]
pack = default

[blender]
exe_path = C:/Program Files/Blender Foundation/Blender 4.1/blender.exe

