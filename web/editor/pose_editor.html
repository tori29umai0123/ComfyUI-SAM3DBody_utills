<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAM 3D Body — Pose Editor</title>
<link rel="stylesheet" href="/extensions/ComfyUI-SAM3DBody_utills/editor/static/style.css" />
<style>
  /* Editor-specific overlays. */
  header .hdr-right { gap: 12px; align-items: center; }
  #confirm-and-close-btn {
    background: #2d7d46;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 600;
  }
  #confirm-and-close-btn:hover { background: #36994f; }
  #confirm-hint { color: #aaa; font-size: 12px; margin-left: 6px; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
  }
}
</script>
<script>
  // Editor mode flag — read by editor_init.js. Must run before the script
  // tags that load editor_init.js / editor_core.js.
  window.SAM3D_EDITOR_MODE = "pose";
</script>
</head>
<body>
<header>
  <div class="hdr-left">
    <h1>SAM 3D Body — Pose Editor</h1>
  </div>
  <div class="hdr-right">
    <div id="status" class="status" data-i18n="status.init">initializing…</div>
    <button id="confirm-and-close-btn" title="Ctrl+Enter">
      Confirm &amp; Close / 確定して閉じる
    </button>
    <span id="confirm-hint">Ctrl+Enter</span>
    <label class="lang-picker">
      <span class="muted" data-i18n="lang.label">Language</span>
      <select id="lang-select">
        <option value="ja">日本語</option>
        <option value="en">English</option>
      </select>
    </label>
  </div>
</header>
<main>
  <aside id="sidebar">
    <!-- ===== Image (pose) tab ===== -->
    <div data-tab-panel="image">
      <section data-pose-lock>
        <h2 data-i18n="section.input">Input</h2>
        <label class="file-drop" id="file-drop">
          <input type="file" id="file-input" accept="image/*" />
          <span id="file-label" data-i18n="input.drop">クリックして画像を選択 / ドロップ</span>
          <img id="preview" alt="preview" hidden />
        </label>
        <button id="run-btn" disabled data-i18n="input.run">ポーズを推定</button>
        <div id="run-info" class="muted"></div>
      </section>
      <section>
        <h2 data-i18n="section.pose_adjust">Pose Adjust</h2>
        <label class="param-row" data-pose-lock>
          <span data-i18n="pose.lean_correction">前かがみ補正</span>
          <input type="range" id="img-lean-range" min="0" max="1" step="0.01" value="0" />
          <input type="number" id="img-lean-num" min="0" max="1" step="0.01" value="0" />
        </label>
        <p class="muted" data-pose-lock data-i18n="pose.lean_correction_hint">ポーズが前のめりになるとき、後ろに反らせる。リアルタイムで 3D プレビューに反映されます。</p>
        <div class="row">
          <button id="pose-edit-toggle-btn" hidden
                  data-i18n="pose.edit_enter"
                  data-i18n-title="tooltip.pose_edit">ポーズ調整（回転）</button>
        </div>
        <div id="pose-edit-panel" hidden>
          <div class="pose-edit-bones">
            <label class="param-row">
              <span data-i18n="pose.selected_bone">選択中のボーン</span>
              <select id="pose-bone-select"></select>
            </label>
            <div class="param-row">
              <span style="min-width: 110px" data-i18n="pose.rot_x">X 軸 (°)</span>
              <input type="range"  id="pose-rot-x-range" min="-180" max="180" step="0.5" value="0" />
              <input type="number" id="pose-rot-x-num"   min="-180" max="180" step="0.5" value="0" />
            </div>
            <div class="param-row">
              <span style="min-width: 110px" data-i18n="pose.rot_y">Y 軸 (°)</span>
              <input type="range"  id="pose-rot-y-range" min="-180" max="180" step="0.5" value="0" />
              <input type="number" id="pose-rot-y-num"   min="-180" max="180" step="0.5" value="0" />
            </div>
            <div class="param-row">
              <span style="min-width: 110px" data-i18n="pose.rot_z">Z 軸 (°)</span>
              <input type="range"  id="pose-rot-z-range" min="-180" max="180" step="0.5" value="0" />
              <input type="number" id="pose-rot-z-num"   min="-180" max="180" step="0.5" value="0" />
            </div>
            <div class="row">
              <button id="pose-undo-btn" data-i18n="pose.undo" disabled>元に戻す (Ctrl+Z)</button>
              <button id="pose-redo-btn" data-i18n="pose.redo" disabled>やり直す (Ctrl+Y)</button>
            </div>
            <div class="row">
              <button id="pose-reset-bone-btn" data-i18n="pose.reset_bone">このボーンをリセット</button>
              <button id="pose-reset-all-btn" data-i18n="pose.reset_all">全ボーンをリセット</button>
            </div>
            <p class="muted" data-i18n="pose.edit_hint"></p>
          </div>
        </div>
      </section>
    </div>

    <!-- ===== Character panel (preset selection only — no slider editing on pose tab) ===== -->
    <section id="character-section" data-tab-show="image" hidden>
      <h2 data-i18n="section.character">Character</h2>
      <div class="row" data-pose-lock>
        <select id="preset-select">
          <option value="" data-i18n="character.preset_placeholder">(preset)</option>
        </select>
        <button id="load-preset-btn" data-i18n="character.load" data-i18n-title="tooltip.pack_switch">Load</button>
      </div>
      <label class="file-drop compact" id="char-json-drop" data-pose-lock>
        <input type="file" id="char-json-input" accept=".json,application/json" />
        <span id="char-json-label" data-i18n="character.json_drop">キャラクター JSON をアップロード (任意)</span>
      </label>
      <div id="char-source-info" class="muted"></div>
      <div class="row"><span id="render-info" class="muted"></span></div>
    </section>
  </aside>

  <section id="viewport" data-tab-show="image">
    <canvas id="three-canvas"></canvas>
    <div id="viewport-overlay" class="muted" data-i18n="viewport.initial">画像を読み込んで「ポーズを推定」を押すと 3D メッシュが表示されます</div>
    <button id="save-render-btn" class="viewport-btn" data-tab-show="image" data-pose-lock
            disabled data-i18n="viewport.save_png"
            data-i18n-title="tooltip.save_png">PNG 保存</button>
  </section>
</main>

<!-- Hidden elements editor_core.js touches but pose-editor doesn't expose. Empty containers
     keep the DOM lookups silent without affecting layout. -->
<div hidden>
  <div data-tab-panel="video"></div>
  <div data-tab-panel="make"></div>
  <div data-tab-panel="admin"></div>
  <div id="body-params-sliders"></div>
  <div id="bone-lengths-sliders"></div>
  <div id="blendshapes-sliders"></div>
  <button id="reset-btn"></button>
  <button id="export-fbx-btn"></button>
  <button id="export-bvh-btn"></button>
  <div id="fbx-info"></div>
  <div id="bvh-info"></div>
  <button id="make-download-btn"></button>
  <div id="make-download-info"></div>
  <input type="file" id="video-input" />
  <input id="video-bbox-thr" />
  <input id="video-fps" />
  <input id="video-stride" />
  <input id="video-max-frames" />
  <input id="video-lean-range" />
  <input id="video-lean-num" />
  <select id="video-root-mode"></select>
  <button id="video-run-btn"></button>
  <div id="video-run-info"></div>
  <button id="video-download-btn"></button>
  <button id="video-download-bvh-btn"></button>
  <div id="video-download-info"></div>
  <div id="video-download-bvh-info"></div>
  <select id="pack-select"></select>
  <button id="pack-switch-btn"></button>
  <input id="pack-new-name" />
  <button id="pack-clone-btn"></button>
  <button id="pack-delete-btn"></button>
  <span id="pack-active-label"></span>
  <div id="fbx-status"></div>
  <input type="file" id="fbx-input" />
  <button id="fbx-rebuild-btn"></button>
  <span id="fbx-rebuild-info"></span>
  <label id="fbx-drop"></label>
  <span id="fbx-label"></span>
  <label id="video-drop"></label>
  <span id="video-label"></span>
  <div id="video-info"></div>
  <section id="health-section"></section>
  <pre id="health"></pre>
</div>

<script src="/extensions/ComfyUI-SAM3DBody_utills/editor/static/editor_init.js?v=5"></script>
<script type="module" src="/extensions/ComfyUI-SAM3DBody_utills/editor/static/i18n.js?v=5"></script>
<script type="module" src="/extensions/ComfyUI-SAM3DBody_utills/editor/static/editor_core.js?v=5"></script>
</body>
</html>
