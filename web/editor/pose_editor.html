<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAM 3D Body — Pose Editor</title>
<link rel="stylesheet" href="/extensions/ComfyUI-SAM3DBody_utills/editor/static/style.css" />
<style>
  /* Editor-specific overlays. */
  header .hdr-right { gap: 12px; align-items: center; }
  #confirm-and-close-btn {
    background: #2d7d46;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 600;
  }
  #confirm-and-close-btn:hover { background: #36994f; }
  #confirm-hint { color: #aaa; font-size: 12px; margin-left: 6px; }

  /* --- Image-range selection UI (overlay on top of #viewport) ----------- */
  #range-overlay {
    position: absolute; inset: 0; pointer-events: none; z-index: 5;
  }
  body.range-select-mode #range-overlay { pointer-events: auto; cursor: crosshair; }
  #range-rect {
    position: absolute; border: 2px solid #ff5050;
    background: rgba(255, 0, 0, 0.28);
    box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.45) inset;
    pointer-events: none;
  }
  #range-rect[hidden] { display: none; }

  /* Left-side toolbar — range / reset / background colour. Mirrors the
     Multi Pose Editor layout so both pages share the same look-and-feel. */
  .viewport-toolbar-left {
    position: absolute; top: 8px; left: 8px; z-index: 7;
    display: flex; gap: 6px; align-items: center;
  }
  .viewport-toolbar-left button {
    padding: 6px 12px; font-size: 12px; cursor: pointer;
    background: rgba(38, 42, 50, 0.92); color: #cef;
    border: 1px solid #588; border-radius: 4px;
    backdrop-filter: blur(2px);
  }
  .viewport-toolbar-left button:hover:not(:disabled) { background: rgba(52, 82, 100, 0.9); }
  .viewport-toolbar-left button:disabled { background: rgba(34, 36, 42, 0.7); color: #667; cursor: not-allowed; }

  /* Range-select active state — red palette to signal the mode change. */
  body.range-select-mode #range-select-btn {
    background: rgba(90, 32, 32, 0.85); color: #fcc; border-color: #944;
  }

  /* Reset button — visible whenever a saved range exists OR while
     range-select mode is active (mirrors the Pose Editor + behaviour
     so the user can scrap the saved rect any time). JS toggles the
     ``hidden`` attribute; the ``[hidden]`` rule below handles the
     vanish-when-not-applicable case. */
  #range-reset-btn {
    background: rgba(60, 32, 32, 0.85); color: #fcc; border-color: #944;
  }
  #range-reset-btn:hover:not(:disabled) { background: rgba(110, 50, 50, 0.9); }
  #range-reset-btn[hidden] { display: none; }

  #bg-color-btn { display: inline-flex; align-items: center; gap: 6px; }

  /* While range-select is active, dim the rest of the UI but keep the
     left-toolbar buttons live so the user can confirm or reset. */
  body.range-select-mode #sidebar,
  body.range-select-mode .tab-nav,
  body.range-select-mode .lang-picker,
  body.range-select-mode #confirm-and-close-btn {
    pointer-events: none; user-select: none; opacity: 0.45;
  }
  body.range-select-mode #range-select-btn,
  body.range-select-mode #range-reset-btn,
  body.range-select-mode #bg-color-btn {
    pointer-events: auto; opacity: 1;
  }

  /* Hand image input row: drop area + 左右反転 button on one line. */
  .hand-input-row {
    display: flex; gap: 6px; align-items: stretch; margin-top: 6px;
  }
  .hand-input-row .file-drop {
    flex: 1 1 auto; margin-top: 0;
  }
  .hand-input-row .hand-flip-btn {
    flex: 0 0 auto; padding: 4px 10px; font-size: 11px;
    background: #355; color: #cef; border: 1px solid #588;
    border-radius: 4px; cursor: pointer;
  }
  .hand-input-row .hand-flip-btn:hover:not(:disabled) {
    background: rgba(85, 119, 136, 0.9);
  }
  .hand-input-row .hand-flip-btn:disabled {
    background: rgba(34, 36, 42, 0.7); color: #667;
    border-color: #333; cursor: not-allowed;
  }
  .hand-drop img {
    display: block; max-width: 100%; max-height: 96px;
    margin: 4px auto 0; border: 1px solid #2a2a2a; border-radius: 3px;
  }

  #bg-color-swatch {
    width: 14px; height: 14px; border-radius: 2px;
    border: 1px solid rgba(255, 255, 255, 0.6); background: #ffffff;
    flex: 0 0 14px;
  }
  #bg-color-input {
    position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0;
  }

  /* Right-side toolbar — translate / rotate gizmo, reset buttons, input
     image overlay toggle. Mirrors the Pose Editor + layout. Hidden via
     JS while pose-edit (IK) mode is active so the body-anchor controls
     don't conflict with bone manipulation. */
  .viewport-toolbar {
    position: absolute; top: 8px; right: 8px; z-index: 7;
    display: flex; gap: 6px; flex-direction: column;
  }
  .viewport-toolbar button {
    padding: 6px 12px; font-size: 12px; cursor: pointer;
    background: rgba(38, 42, 50, 0.92); color: #cef;
    border: 1px solid #588; border-radius: 4px;
    backdrop-filter: blur(2px);
  }
  .viewport-toolbar button:hover:not(:disabled) {
    background: rgba(52, 82, 100, 0.9);
  }
  .viewport-toolbar button:disabled {
    background: rgba(34, 36, 42, 0.7); color: #667; cursor: not-allowed;
  }
  .viewport-toolbar button.active {
    background: #2d7d46; color: white; border-color: #36994f;
  }

  /* Input-image overlay (toggleable) — small thumbnail in top-left. */
  #image-display-overlay {
    position: absolute; top: 8px; left: 8px; z-index: 3;
    max-width: 35%; max-height: 35%;
    border: 1px solid #444; background: #1e1e1e; padding: 4px;
    display: none;
  }
  #image-display-overlay.visible { display: block; }
  #image-display-overlay img {
    display: block; max-width: 100%; max-height: 240px;
  }
  #image-display-overlay .caption {
    font-size: 10px; color: #999; margin-top: 2px;
  }

  body.range-select-mode .viewport-toolbar {
    pointer-events: none; opacity: 0.45;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
  }
}
</script>
<script>
  // Editor mode flag — read by editor_init.js. Must run before the script
  // tags that load editor_init.js / editor_core.js.
  window.SAM3D_EDITOR_MODE = "pose";
</script>
</head>
<body>
<header>
  <div class="hdr-left">
    <h1>SAM 3D Body — Pose Editor</h1>
  </div>
  <div class="hdr-right">
    <div id="status" class="status" data-i18n="status.init">initializing…</div>
    <button id="confirm-and-close-btn" title="Ctrl+Enter">
      Confirm &amp; Close / 確定して閉じる
    </button>
    <span id="confirm-hint">Ctrl+Enter</span>
    <label class="lang-picker">
      <span class="muted" data-i18n="lang.label">Language</span>
      <select id="lang-select">
        <option value="ja">日本語</option>
        <option value="en">English</option>
      </select>
    </label>
  </div>
</header>
<main>
  <aside id="sidebar">
    <!-- ===== Image (pose) tab ===== -->
    <div data-tab-panel="image">
      <section data-pose-lock>
        <h2 data-i18n="section.input">Input</h2>
        <label class="file-drop" id="file-drop">
          <input type="file" id="file-input" accept="image/*" />
          <span id="file-label" data-i18n="input.drop">クリックして画像を選択 / ドロップ</span>
          <img id="preview" alt="preview" hidden />
        </label>

        <!-- Optional per-hand crops. Drag&drop or click; the 左右反転 button
             flips the loaded image in place. When provided, the editor sends
             these alongside the main image so the hand-only decoder can
             override the body's hand pose. -->
        <div class="hand-input-row">
          <label class="file-drop compact hand-drop" id="lhand-drop">
            <input type="file" id="lhand-file-input" accept="image/*" />
            <span id="lhand-file-label" data-i18n="input.lhand_drop">Left hand image</span>
            <img id="lhand-preview" alt="left hand" hidden />
          </label>
          <button type="button" id="lhand-flip-btn" class="hand-flip-btn"
                  disabled data-i18n="input.flip_lr"
                  data-i18n-title="tooltip.hand_flip">左右反転</button>
        </div>
        <div class="hand-input-row">
          <label class="file-drop compact hand-drop" id="rhand-drop">
            <input type="file" id="rhand-file-input" accept="image/*" />
            <span id="rhand-file-label" data-i18n="input.rhand_drop">Right hand image</span>
            <img id="rhand-preview" alt="right hand" hidden />
          </label>
          <button type="button" id="rhand-flip-btn" class="hand-flip-btn"
                  disabled data-i18n="input.flip_lr"
                  data-i18n-title="tooltip.hand_flip">左右反転</button>
        </div>

        <button id="run-btn" disabled data-i18n="input.run">ポーズを推定</button>
        <div id="run-info" class="muted"></div>
      </section>
      <section>
        <h2 data-i18n="section.pose_adjust">Pose Adjust</h2>
        <label class="param-row" data-pose-lock>
          <span data-i18n="pose.lean_correction">前かがみ補正</span>
          <input type="range" id="img-lean-range" min="0" max="1" step="0.01" value="0" />
          <input type="number" id="img-lean-num" min="0" max="1" step="0.01" value="0" />
        </label>
        <div class="row">
          <button id="pose-edit-toggle-btn" hidden
                  data-i18n="pose.edit_enter"
                  data-i18n-title="tooltip.pose_edit">ポーズ調整（回転）</button>
        </div>
        <div id="pose-edit-panel" hidden>
          <div class="pose-edit-bones">
            <label class="param-row">
              <span data-i18n="pose.selected_bone">選択中のボーン</span>
              <select id="pose-bone-select"></select>
            </label>
            <div class="param-row">
              <span style="min-width: 110px" data-i18n="pose.rot_x">X 軸 (°)</span>
              <input type="range"  id="pose-rot-x-range" min="-180" max="180" step="0.5" value="0" />
              <input type="number" id="pose-rot-x-num"   min="-180" max="180" step="0.5" value="0" />
            </div>
            <div class="param-row">
              <span style="min-width: 110px" data-i18n="pose.rot_y">Y 軸 (°)</span>
              <input type="range"  id="pose-rot-y-range" min="-180" max="180" step="0.5" value="0" />
              <input type="number" id="pose-rot-y-num"   min="-180" max="180" step="0.5" value="0" />
            </div>
            <div class="param-row">
              <span style="min-width: 110px" data-i18n="pose.rot_z">Z 軸 (°)</span>
              <input type="range"  id="pose-rot-z-range" min="-180" max="180" step="0.5" value="0" />
              <input type="number" id="pose-rot-z-num"   min="-180" max="180" step="0.5" value="0" />
            </div>
            <div class="row">
              <button id="pose-undo-btn" data-i18n="pose.undo" disabled>元に戻す (Ctrl+Z)</button>
              <button id="pose-redo-btn" data-i18n="pose.redo" disabled>やり直す (Ctrl+Y)</button>
            </div>
            <div class="row">
              <button id="pose-reset-bone-btn" data-i18n="pose.reset_bone">このボーンをリセット</button>
              <button id="pose-reset-all-btn" data-i18n="pose.reset_all">全ボーンをリセット</button>
            </div>
            <p class="muted" data-i18n="pose.edit_hint"></p>
          </div>
        </div>
      </section>
    </div>

    <!-- ===== Body Preset panel (preset selection only — no slider editing on pose tab) ===== -->
    <section id="body-preset-section" data-tab-show="image" hidden>
      <h2 data-i18n="section.body_preset">Body Preset</h2>
      <div class="row" data-pose-lock>
        <select id="preset-select">
          <option value="" data-i18n="body_preset.preset_placeholder">(preset)</option>
        </select>
        <button id="load-preset-btn" data-i18n="body_preset.load" data-i18n-title="tooltip.pack_switch">Load</button>
      </div>
      <label class="file-drop compact" id="body-preset-json-drop" data-pose-lock>
        <input type="file" id="body-preset-json-input" accept=".json,application/json" />
        <span id="body-preset-json-label" data-i18n="body_preset.json_drop">ボディプリセット JSON をアップロード (任意)</span>
      </label>
      <div id="body-preset-source-info" class="muted"></div>
      <div class="row"><span id="render-info" class="muted"></span></div>
    </section>
  </aside>

  <section id="viewport" data-tab-show="image">
    <canvas id="three-canvas"></canvas>
    <div id="viewport-overlay" class="muted" data-i18n="viewport.initial">画像を読み込んで「ポーズを推定」を押すと 3D メッシュが表示されます</div>
    <div class="viewport-toolbar-left" data-tab-show="image">
      <button id="range-select-btn" data-pose-lock disabled
              data-i18n="viewport.range_enter"
              data-i18n-title="tooltip.range_select">画像範囲</button>
      <button id="range-reset-btn" type="button"
              data-i18n="viewport.range_reset"
              data-i18n-title="tooltip.range_reset">reset</button>
      <button id="bg-color-btn" type="button" data-pose-lock
              data-i18n-title="tooltip.bg_color">
        <span id="bg-color-swatch"></span>
        <span data-i18n="viewport.bg_color">背景色</span>
        <input type="color" id="bg-color-input" value="#ffffff" />
      </button>
    </div>
    <div id="range-overlay">
      <div id="range-rect" hidden></div>
    </div>

    <!-- Input-image overlay thumbnail (toggleable from right toolbar). -->
    <div id="image-display-overlay">
      <img id="image-display-img" alt="" />
      <div class="caption" id="image-display-caption">image</div>
    </div>

    <!-- Right-side toolbar: translate / rotate gizmo + resets + image
         preview toggle. Hidden during pose-edit (IK) mode. -->
    <div class="viewport-toolbar" data-tab-show="image">
      <button id="gizmo-translate-btn" class="active" type="button"
              data-i18n-title="tooltip.gizmo_translate" title="移動 (W)">
        <span data-i18n="viewport.gizmo_translate">移動</span>
      </button>
      <button id="gizmo-rotate-btn" type="button"
              data-i18n-title="tooltip.gizmo_rotate" title="回転 (E)">
        <span data-i18n="viewport.gizmo_rotate">回転</span>
      </button>
      <button id="reset-translate-btn" type="button"
              data-i18n-title="tooltip.reset_translate"
              title="移動量を 0 に戻す">
        <span data-i18n="viewport.reset_translate">移動リセット</span>
      </button>
      <button id="reset-rotate-btn" type="button"
              data-i18n-title="tooltip.reset_rotate"
              title="回転量を 0 に戻す">
        <span data-i18n="viewport.reset_rotate">回転リセット</span>
      </button>
      <button id="toggle-img-btn" type="button"
              data-i18n-title="tooltip.toggle_image"
              title="入力画像オーバーレイ">
        <span data-i18n="viewport.toggle_image">入力画像表示</span>
      </button>
    </div>

    <!-- Stub: kept for editor_core.js compatibility (id is referenced in
         INFERENCE_LOCK_IDS / various save handlers). Not visible. -->
    <button id="save-render-btn" hidden disabled></button>
  </section>
</main>

<!-- Hidden elements editor_core.js touches but pose-editor doesn't expose. Empty containers
     keep the DOM lookups silent without affecting layout. -->
<div hidden>
  <div data-tab-panel="video"></div>
  <div data-tab-panel="make"></div>
  <div data-tab-panel="admin"></div>
  <div id="body-params-sliders"></div>
  <div id="bone-lengths-sliders"></div>
  <div id="blendshapes-sliders"></div>
  <button id="reset-btn"></button>
  <button id="export-fbx-btn"></button>
  <button id="export-bvh-btn"></button>
  <div id="fbx-info"></div>
  <div id="bvh-info"></div>
  <button id="make-download-btn"></button>
  <div id="make-download-info"></div>
  <input type="file" id="video-input" />
  <input id="video-bbox-thr" />
  <input id="video-fps" />
  <input id="video-stride" />
  <input id="video-max-frames" />
  <input id="video-lean-range" />
  <input id="video-lean-num" />
  <select id="video-root-mode"></select>
  <button id="video-run-btn"></button>
  <div id="video-run-info"></div>
  <button id="video-download-btn"></button>
  <button id="video-download-bvh-btn"></button>
  <div id="video-download-info"></div>
  <div id="video-download-bvh-info"></div>
  <select id="pack-select"></select>
  <button id="pack-switch-btn"></button>
  <input id="pack-new-name" />
  <button id="pack-clone-btn"></button>
  <button id="pack-delete-btn"></button>
  <span id="pack-active-label"></span>
  <div id="fbx-status"></div>
  <input type="file" id="fbx-input" />
  <button id="fbx-rebuild-btn"></button>
  <span id="fbx-rebuild-info"></span>
  <label id="fbx-drop"></label>
  <span id="fbx-label"></span>
  <label id="video-drop"></label>
  <span id="video-label"></span>
  <div id="video-info"></div>
  <section id="health-section"></section>
  <pre id="health"></pre>
</div>

<script src="/extensions/ComfyUI-SAM3DBody_utills/editor/static/editor_init.js?v=10"></script>
<script type="module" src="/extensions/ComfyUI-SAM3DBody_utills/editor/static/i18n.js?v=10"></script>
<script type="module" src="/extensions/ComfyUI-SAM3DBody_utills/editor/static/editor_core.js?v=11"></script>
</body>
</html>
