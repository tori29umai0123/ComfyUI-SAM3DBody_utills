; Which preset pack the runtime is currently using.
; `pack` must match a directory name under presets/ — for example
;   presets/default/          -> pack = default
;   presets/my_custom_pack/   -> pack = my_custom_pack
;
; A preset pack consists of:
;   presets/<pack>/face_blendshapes.npz
;   presets/<pack>/mhr_reference_vertices.json
;   presets/<pack>/chara_settings_presets/*.json
;
; To install a redistributable pack, drop its folder under presets/ and
; change the `pack = ` line below to that folder's name. ComfyUI reload
; picks up the change.

[active]
pack = default
